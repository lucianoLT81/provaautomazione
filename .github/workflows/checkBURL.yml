name: Controllo BUR Lazio

on:
  schedule:
    - cron: '0 * * * *' # Ogni ora
  workflow_dispatch:
        
jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Serve per salvare lo stato della pagina
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Controllo Sintassi Bash
        uses: ludeeus/action-shellcheck@master
      - name: Install dependencies
        run: sudo apt-get install -y jq poppler-utils
      - name: Verifica BUR
        run: |
          set -x
          NEWPDF=0 #variabile di controllo per il rinvenimento di nuovi pdf od il rivenimento di chiavi specifiche nei nuovi pdf

          # Scarica la nuova pagina HTML
          curl -s "https://sicer.regione.lazio.it/PublicBur/burlazio/FrontEnd" > pagina_nuova.html

          # Confronta la nuova pagina con quella precedente
          if ! diff -q pagina_nuova.html pagina_vecchia.html; then
            mkdir -p allegati_nuovi

            # Estrae i link ai PDF dalla pagina HTML SENZA usare una subshell
            while read -r link; do
              URL_COMPLETO="https://sicer.regione.lazio.it$link"
              NOME_FILE=$(basename "$link")

              if [ ! -f "allegati_nuovi/$NOME_FILE" ]; then
                curl -sL "$URL_COMPLETO" -o "allegati_nuovi/$NOME_FILE"

                if pdftotext "allegati_nuovi/$NOME_FILE" - | grep -q "2021IT05SFPR006"; then
                    NEWPDF=2
                elif [ "$NEWPDF" -ne 2 ]; then
                    NEWPDF=1
                fi
              fi
            done < <(grep -oP 'href="\K[^"]+\.pdf' pagina_nuova.html)

            mv pagina_nuova.html pagina_vecchia.html
            git add pagina_vecchia.html

            # Commit SOLO se c'è almeno un nuovo PDF (NEWPDF != 0)
            if [ "$NEWPDF" -ne 0 ]; then
              git config user.name "GitHub Action"
              git config user.email "action@github.com"
              git add pagina_vecchia.html allegati_nuovi/
              git commit -m "Nuova pagina BUR rilevata"
              git push
            fi

            if [ "$NEWPDF" = "1" ]; then
              echo "NUOVO DOCUMENTO PDF SCARICATO SENZA STRINGA - MALEDIZIONE!"
              exit 1
            elif [ "$NEWPDF" = "2" ]; then
              echo "STRINGA ASILI TROVATA - EVVIVA!"
              exit 1
            fi
          else
            echo "Nulla di nuovo."
            exit 0
          fi

#parole da cercare con la prossima versione: "CCI 2021IT05SFPR006"
