name: Controllo BUR Lazio

on:
  schedule:
    - cron: '0 * * * *'   # ogni ora
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scarica pagina BUR e estrai nomi PDF
        run: |
          set -x

          # Scarica la pagina
          curl -s "https://sicer.regione.lazio.it/PublicBur/burlazio/FrontEnd/UltimiEdiz" > pagina_nuova.html

          # Estrai i nomi dei PDF
          grep -oP "onGenericStreamRead\('\K[^']+\.pdf" pagina_nuova.html | sort -u > pdf_nuovi.txt

          # Se non esiste ancora il file vecchio, crealo vuoto
          if [ ! -f pdf_vecchi.txt ]; then
            touch pdf_vecchi.txt
          fi

          # Confronta i due insiemi
          NUOVI=$(comm -13 pdf_vecchi.txt pdf_nuovi.txt)

          echo "PDF nuovi trovati:"
          echo "$NUOVI"

          # Aggiorna il file vecchio
          cp pdf_nuovi.txt pdf_vecchi.txt

          # Se ci sono PDF nuovi → errore (alert)
          if [ -n "$NUOVI" ]; then
            echo "Trovati nuovi PDF!"
            git config user.name "GitHub Action"
            git config user.email "action@github.com"
            git add pdf_vecchi.txt pagina_nuova.html
            git commit -m "Nuovi PDF trovati"
            git push
            exit 1
          else
            echo "Nessun nuovo PDF."
            exit 0
          fi
#parole da cercare con la prossima versione: "CCI 2021IT05SFPR006"
